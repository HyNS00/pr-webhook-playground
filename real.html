<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Real Fun Page</title>
  <style>
    :root {
      --bg1: #ffecd2;
      --bg2: #fcb69f;
      --card: #ffffff;
      --ink: #222;
      --accent: #ff5e5b;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: "Noto Sans KR", sans-serif;
      background: radial-gradient(circle at top left, var(--bg1), var(--bg2));
      overflow: hidden;
    }

    .blob {
      position: fixed;
      width: 220px;
      height: 220px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.25);
      filter: blur(2px);
      animation: float 6s ease-in-out infinite;
    }

    .blob.b1 { top: 8%; left: 10%; }
    .blob.b2 { bottom: 12%; right: 10%; animation-delay: 1.4s; }

    .card {
      width: min(92vw, 560px);
      padding: 30px;
      border-radius: 18px;
      background: var(--card);
      box-shadow: 0 14px 40px rgba(0, 0, 0, 0.16);
      text-align: center;
      position: relative;
      z-index: 2;
      animation: pop 0.55s ease-out;
    }

    h1 {
      margin: 0;
      font-size: clamp(28px, 5vw, 42px);
      color: var(--ink);
    }

    p {
      margin: 12px 0 0;
      color: #555;
      line-height: 1.5;
    }

    .badge {
      display: inline-block;
      margin-top: 16px;
      padding: 8px 12px;
      border-radius: 999px;
      background: #fff2f2;
      color: var(--accent);
      font-weight: 700;
      font-size: 14px;
    }

    .joke {
      margin-top: 18px;
      padding: 12px 14px;
      background: #f7f8fa;
      border-radius: 10px;
      color: #333;
      font-size: 15px;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-16px); }
    }

    @keyframes pop {
      from { transform: scale(0.95); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }
  </style>
</head>
<body>
  <div class="blob b1" aria-hidden="true"></div>
  <div class="blob b2" aria-hidden="true"></div>

  <main class="card">
    <h1>real.html 등장!</h1>
    <p>파일명 변경 성공. 이제 페이지가 조금 더 신나졌습니다.</p>
    <div class="badge">Mission Complete</div>
    <div class="joke">개발자 농담: 버그는 사라진 게 아니라, 잠깐 안 보이는 중입니다.</div>
  </main>
</body>
</html>
